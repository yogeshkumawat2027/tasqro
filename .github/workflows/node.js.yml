name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
      node-version: [22.x]

    steps:
      - name: Deploy backend on EC2
        run: |
          cd /home/ubuntu/tasqro

          if [ -f backend/.env ]; then
            cp backend/.env /tmp/tasqro_backend_env_backup
          fi

          git fetch origin main
          git reset --hard origin/main

          if [ -f /tmp/tasqro_backend_env_backup ]; then
            cp /tmp/tasqro_backend_env_backup backend/.env
            rm /tmp/tasqro_backend_env_backup
          fi

          cd backend
          npm ci
          npm test --if-present
          npm run build --if-present

          pm2 restart tasqro-backend || pm2 start npm --name tasqro-backend -- start
          pm2 save
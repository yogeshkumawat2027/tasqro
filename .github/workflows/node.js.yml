name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Test and deploy backend
        run: |
          cd /home/ubuntu/tasqro

          if [ -f backend/.env ]; then
            cp backend/.env /tmp/tasqro_backend_env_backup
          fi

          git fetch origin main
          git reset --hard origin/main

          if [ -f /tmp/tasqro_backend_env_backup ]; then
            cp /tmp/tasqro_backend_env_backup backend/.env
            rm /tmp/tasqro_backend_env_backup
          fi

          cd backend
          npm install --no-audit --no-fund
          npm test --if-present
          npm run build --if-present

          pm2 restart tasqro-backend || pm2 start npm --name tasqro-backend -- start
          pm2 save
